server:
  port: 8080

spring:
  profiles:
    active: dev,local
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

upload:
  avatar-dir: uploads/avatars
  image-dir: uploads/images

jwt:
  secret: ${JWT_SECRET}
  expiration: 7200000

deepseek:
  api-key: ${DEEPSEEK_API_KEY:sk-placeholder}
  api-url: https://api.deepseek.com/chat/completions
  model: deepseek-chat
